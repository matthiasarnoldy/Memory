<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings</title>
</head>

<body class="settings">
    <header>
        <h1 class="headline">Settings</h1>
        <img class="headline__decorLine" src="../public/assets/icons/decorLineLeft.svg" alt="">
    </header>

    <main>
        <section class="options">
            <fieldset>
                <legend>
                    <div class="fieldset__headline">
                        <img src="../public/assets/icons/palette.svg" alt="">
                        <span>Game themes</span>
                    </div>
                </legend>
                <section class="fieldset__settings">
                    <label>
                        <input type="radio" name="themes" value="CodeVibesTheme" checked>
                        <div class="settings__choosing">
                            <span>Code vibes theme</span>
                            <img src="../public/assets/icons/decorLineRight.svg" alt="">
                        </div>
                    </label>
                    <label>
                        <input type="radio" name="themes" value="GamingTheme">
                        <div class="settings__choosing">
                            <span>Gaming theme</span>
                            <img src="../public/assets/icons/decorLineRight.svg" alt="">
                        </div>
                    </label>
                    <label>
                        <input type="radio" name="themes" value="DaProjectsTheme">
                        <div class="settings__choosing">
                            <span>DA Projects theme</span>
                            <img src="../public/assets/icons/decorLineRight.svg" alt="">
                        </div>
                    </label>
                    <label>
                        <input type="radio" name="themes" value="FoodsTheme">
                        <div class="settings__choosing">
                            <span>Foods theme</span>
                            <img src="../public/assets/icons/decorLineRight.svg" alt="">
                        </div>
                    </label>
                </section>
            </fieldset>
            <fieldset>
                <legend>
                    <div class="fieldset__headline">
                        <img src="../public/assets/icons/chessPawn.svg" alt="">
                        <span>Chose player</span>
                    </div>
                </legend>
                <section class="fieldset__settings">
                    <label>
                        <input type="radio" name="cardCount" value="Blue">
                        <div class="settings__choosing">
                            <span>Blue</span>
                            <img src="../public/assets/icons/decorLineRight.svg" alt="">
                        </div>
                    </label>
                    <label>
                        <input type="radio" name="cardCount" value="Orange">
                        <div class="settings__choosing">
                            <span>Orange</span>
                            <img src="../public/assets/icons/decorLineRight.svg" alt="">
                        </div>
                    </label>
                </section>
            </fieldset>
            <fieldset>
                <legend>
                    <div class="fieldset__headline">
                        <img src="../public/assets/icons/style.svg" alt="">
                        <span>Board size</span>
                    </div>
                </legend>
                <section class="fieldset__settings">
                    <label>
                        <input type="radio" name="players" value="16">
                        <div class="settings__choosing">
                            <span>16 cards</span>
                            <img src="../public/assets/icons/decorLineRight.svg" alt="">
                        </div>
                    </label>
                    <label>
                        <input type="radio" name="players" value="24">
                        <div class="settings__choosing">
                            <span>24 cards</span>
                            <img src="../public/assets/icons/decorLineRight.svg" alt="">
                        </div>
                    </label>
                    <label>
                        <input type="radio" name="players" value="32">
                        <div class="settings__choosing">
                            <span>32 cards</span>
                            <img src="../public/assets/icons/decorLineRight.svg" alt="">
                        </div>
                    </label>
                </section>
            </fieldset>
        </section>
        <section class="options__choosed">
            <img src="../public/assets/img/codeVibes.png" alt="">
            <div class="settings__choosed">
                <span>Game theme</span>
                <img src="../public/assets/icons/dividingLine.svg" alt="">
                <span>Player</span>
                <img src="../public/assets/icons/dividingLine.svg" alt="">
                <span>Board size</span>
                <a href="./pages/game.html" class="button button--small is-disabled">
                    <img class="button__icon" src="../public/assets/icons/play.svg" alt="">
                    <span>Play</span>
                </a>
            </div>
        </section>
    </main>

    <script type="module" src="/src/main.ts"></script>
</body>

</html>
